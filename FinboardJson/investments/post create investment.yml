info:
  name: post create investment
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/investments"
  body:
    type: json
    data: |-
      {
        "transaction_id": "{{transaction_id}}",
        "expected_gain": 15.5,
        "risk_level": "medium",
        "status": "active"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
